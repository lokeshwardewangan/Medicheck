services:
  postgres:
    image: postgres:16-alpine
    container_name: healthmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthmate
      POSTGRES_PASSWORD: healthmate
      POSTGRES_DB: healthmate
    ports:
      # Host 5433 → container 5432, so it doesn't clash with a Windows-native
      # PostgreSQL install also listening on 5432. DATABASE_URL must use 5433.
      - '5433:5432'
    volumes:
      - healthmate-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U healthmate -d healthmate']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  healthmate-pgdata:
