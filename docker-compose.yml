services:
  postgres:
    image: postgres:16-alpine
    container_name: medicheck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medicheck
      POSTGRES_PASSWORD: medicheck
      POSTGRES_DB: medicheck
    ports:
      - "5432:5432"
    volumes:
      - medicheck-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicheck -d medicheck"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  medicheck-pgdata:
